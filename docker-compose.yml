services:
  # 1. ゲームサーバー本体
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/workspaces/game-server-base:cached
    depends_on:
      - db
      - redis
      - memcached

  # 2. データベース (PostgreSQL)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: game_db
    ports:
      - "5432:5432"

  # 3. キャッシュサーバー (Redis)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 4. キャッシュサーバー (Memcached)
  memcached:
    image: memcached:alpine
    ports:
      - "11211:11211"